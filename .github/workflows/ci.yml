name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Unit + Integration Tests
        run: pnpm test

      - name: UI Smoke
        run: pnpm test:smoke

      - name: Critical Test Gate
        run: pnpm test:critical-gate

      - name: Config Contract Validation
        run: pnpm config:validate

      - name: Edge Surface Inventory Generation
        run: pnpm surface:generate
